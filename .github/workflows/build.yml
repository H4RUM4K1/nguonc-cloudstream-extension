name: Build

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths-ignore:
      - '*.md'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: 8.10.2

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Build plugins
        run: gradle make makePluginsJson ensureJarCompatibility

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: nguonc-extension-build
          path: |
            **/build/*.cs3
            **/build/*.jar
            build/plugins.json
