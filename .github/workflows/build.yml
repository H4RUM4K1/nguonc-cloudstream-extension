name: Build

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths-ignore:
      - '*.md'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: 8.10.2

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Build plugins
        run: gradle make makePluginsJson ensureJarCompatibility

      - name: Publish builds branch
        shell: bash
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          shopt -s globstar nullglob

          rm -rf builds_out
          mkdir -p builds_out

          cp **/build/*.cs3 builds_out/ || true
          cp **/build/*.jar builds_out/ || true
          cp build/plugins.json builds_out/plugins.json

          cat > builds_out/repo.json <<EOF
          {
            "name": "Nguonc CloudStream Repository",
            "description": "Nguonc CloudStream extension feed",
            "manifestVersion": 1,
            "pluginLists": [
              "https://raw.githubusercontent.com/${GITHUB_REPOSITORY}/builds/plugins.json"
            ]
          }
          EOF

          cd builds_out
          git init
          git config user.email "actions@github.com"
          git config user.name "GitHub Actions"
          git add .
          git commit -m "Build $GITHUB_SHA"
          git branch -M builds
          git remote add origin "https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"
          git push --force origin builds

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: nguonc-extension-build
          path: |
            **/build/*.cs3
            **/build/*.jar
            build/plugins.json
